":400,"text":"\n\n&lt;center&gt;&lt;h1&gt; Info &lt;/h1&gt;&lt;/center&gt;\n\nThese plots are set up so that for every WCAID, all the competitions are included. Unfortunately, if you've been all around the world, you wll have to scroll and zoom to make it readable.\n&lt;br&gt;&lt;br&gt;\nIn each of the tabs, you can hover over data points to see additional information such as the name of the competition or the event in which you had a record.&lt;br&gt;\nLegends are clickable: by clicking on a specific entry, you will hide the corresponding data points.\n&lt;br&gt;&lt;br&gt;\nThe graph tab shows competitions linked one after the other. The darker the color, the further apart those competitions were.\n&lt;br&gt;&lt;br&gt;\nGreen button takes you to this person's WCA profile.&lt;br&gt;\nBlue button takes you to my github in which you will find the notebook to make your own map.&lt;br&gt;\nIf you have Anaconda installed, all the libraries should already be there.\n&lt;br&gt;&lt;br&gt;\nHave fun!\n&lt;br&gt;&lt;br&gt;\nTommaso, 2014RAPO01\n","width":800},"id":"1443","type":"Div"},{"attributes":{"data_source":{"id":"1002"},"glyph":{"id":"1249"},"hover_glyph":null,"muted_glyph":null,"nonselection_glyph":{"id":"1250"},"view":{"id":"1206"}},"id":"1251","type":"GlyphRenderer"},{"attributes":{},"id":"1143","type":"LinearScale"},{"attributes":{"attribution":"Tiles by Carto, under CC BY 3.0. Data by OSM, under ODbL","url":"http://a.basemaps.cartocdn.com/rastertiles/voyager/{Z}/{X}/{Y}.png"},"id":"1244","type":"WMTSTileSource"},{"attributes":{"text":"Interactive map of 2014RAPO01's competitions"},"id":"1279","type":"Title"},{"attributes":{"dimension":"lon"},"id":"1146","type":"MercatorTicker"},{"attributes":{},"id":"1183","type":"AllLabels"},{"attributes":{"label":{"value":"Podium"},"renderers":[{"id":"1251"}]},"id":"1261","type":"LegendItem"},{"attributes":{"column_name":"competitors_cat","group":"C"},"id":"1008","type":"GroupFilter"},{"attributes":{"attribution":"Tiles by Carto
